    - url: "https://blog.google/technology/ai/rss/"
      name: "Google AI Blog"
      vendor: "Google"
    - url: "https://ai.meta.com/blog/rss/"
      name: "Meta AI Blog"
      vendor: "Meta"

vendors:
  international:
    - "OpenAI"
    - "Anthropic"
    - "Google"
    - "Meta"
    - "xAI"
  china:
    - "阿里"
    - "字节"
    - "MiniMax"
    - "Kimi"
    - "百度"

dimensions:
  - key: "reasoning"
    label: "🧠 推理"
    color: "#7ee787"
    border: "#7ee787"
  - key: "multimodal"
    label: "👁️ 多模态"
    color: "#79c0ff"
    border: "#79c0ff"
  - key: "code"
    label: "💻 代码"
    color: "#f78166"
    border: "#f78166"
  - key: "long_context"
    label: "📄 长上下文"
    color: "#d2a8ff"
    border: "#d2a8ff"
  - key: "speed_cost"
    label: "⚡ 速度/成本"
    color: "#ffa657"
    border: "#ffa657"

email:
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  from_addr: "your@gmail.com"
  to_addrs:
    - "your@gmail.com"

schedule:
  times: ["10:00", "22:00"]
  timezone: "Asia/Shanghai"
  window_hours: 12
